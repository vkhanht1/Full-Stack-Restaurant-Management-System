name: MiskaPho CI/CD Tools

on:
  push:
    branches: [ "main" ]

permissions:
  packages: write
  contents: read

jobs:
  continuous-integration:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Setup Node.js environment
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install and verify backend dependencies
        run: |
          cd backend
          npm install

  continuous-delivery:
    needs: continuous-integration
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Log in to Docker Hub Registry
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Log in to GitHub Container Registry (GHCR)
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Backend Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/miskapho-backend:latest
            ghcr.io/${{ github.repository }}/backend:latest

      - name: Build and push Frontend Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          build-args: |
            VITE_API_BASE_URL=http://localhost:5000
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/miskapho-frontend:latest
            ghcr.io/${{ github.repository }}/frontend:latest

      - name: Build and push Admin Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./admin
          push: true
          build-args: |
            VITE_API_BASE_URL=http://localhost:5000
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/miskapho-admin:latest
            ghcr.io/${{ github.repository }}/admin:latest
