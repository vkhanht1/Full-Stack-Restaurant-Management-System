services:
  backend:
    build: ./backend
    ports:
      - "5000:5000"
    env_file:
      - ./backend/.env

  frontend:
    build:
      context: ./frontend
      args:
        - VITE_API_BASE_URL=http://localhost:5000
    ports:
      - "3000:80"
    depends_on:
      - backend

  admin:
    build:
      context: ./admin
      args:
        - VITE_API_BASE_URL=http://localhost:5000
    ports:
      - "3001:80"
    depends_on:
      - backend